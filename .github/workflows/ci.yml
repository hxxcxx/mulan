name: Build

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  build-windows:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Qt6 ──
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          cache: true

      # ── OpenCASCADE 7.9.3 ──
      # combined zip = OCCT + 3rdparty，无需单独下载 3rdparty
      - name: Cache OpenCASCADE
        id: cache-occt
        uses: actions/cache@v4
        with:
          path: C:\OCCT
          key: occt-7.9.3-vc14-64-combined-v2

      - name: Download and extract OpenCASCADE
        if: steps.cache-occt.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $occtUrl = "https://github.com/Open-Cascade-SAS/OCCT/releases/download/V7_9_3/opencascade-7.9.3-vc14-64-combined.zip"
          $occtZip = "$env:RUNNER_TEMP\occt-combined.zip"

          Write-Host "Downloading OCCT 7.9.3 combined (includes 3rdparty)..."
          Invoke-WebRequest -Uri $occtUrl -OutFile $occtZip -MaximumRetryCount 3

          Write-Host "Extracting..."
          Expand-Archive -Path $occtZip -DestinationPath "C:\OCCT" -Force

          Write-Host "Verifying extraction..."
          Get-ChildItem "C:\OCCT" -Depth 1 | ForEach-Object { Write-Host "  $($_.FullName)" }

      - name: Resolve OCCT_ROOT and OCCT_3RDPARTY_DIR
        shell: pwsh
        run: |
          $occtRoot = "C:\OCCT"
          $thirdPartyDir = "C:\OCCT"

          # 查找含 inc 的目录
          if (-not (Test-Path "$occtRoot\inc")) {
            $sub = Get-ChildItem $occtRoot -Directory -Recurse -Depth 1 |
              Where-Object { Test-Path "$($_.FullName)\inc" } |
              Select-Object -First 1
            if ($sub) { $occtRoot = $sub.FullName }
          }

          # 查找含 vc14 的 3rdparty 目录
          if (-not (Test-Path "$thirdPartyDir\vc14")) {
            $top = Get-ChildItem $thirdPartyDir -Directory -Recurse -Depth 2 |
              Where-Object { Test-Path "$($_.FullName)\vc14" } |
              Select-Object -First 1
            if ($top) { $thirdPartyDir = $top.FullName }
          }

          Write-Host "OCCT_ROOT: $occtRoot"
          Write-Host "OCCT_3RDPARTY_DIR: $thirdPartyDir"
          "OCCT_ROOT=$occtRoot" >> $env:GITHUB_ENV
          "OCCT_3RDPARTY_DIR=$thirdPartyDir" >> $env:GITHUB_ENV

      # ── vcpkg ──
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "616affa24b974b710a4fc26257e90b7fda6d6826"

      # DXC 是构建工具。CI 使用 Microsoft 预编译版本，避免现场编译 LLVM。
      - name: Cache DXC
        id: cache-dxc
        uses: actions/cache@v4
        with:
          path: C:\DXC
          key: dxc-v1.8.2505.1-windows-x64

      - name: Install DXC
        if: steps.cache-dxc.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $archive = "$env:RUNNER_TEMP\dxc.zip"
          $url = "https://github.com/microsoft/DirectXShaderCompiler/releases/download/v1.8.2505.1/dxc_2025_07_14.zip"
          Invoke-WebRequest -Uri $url -OutFile $archive -MaximumRetryCount 3
          Expand-Archive -Path $archive -DestinationPath "C:\DXC" -Force

      - name: Add DXC to PATH
        shell: pwsh
        run: |
          $dxc = Get-ChildItem "C:\DXC" -Filter dxc.exe -File -Recurse |
            Where-Object { $_.FullName -match '[\\/]x64[\\/]' } |
            Select-Object -First 1
          if (-not $dxc) { throw "dxc.exe was not found in the DXC distribution" }
          $dxc.DirectoryName >> $env:GITHUB_PATH
          "MULAN_DXC_EXECUTABLE=$($dxc.FullName)" >> $env:GITHUB_ENV
          Write-Host "Using DXC: $($dxc.FullName)"

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build/msvc/vcpkg_installed
          key: vcpkg-installed-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      # ── Configure & Build ──
      - name: Configure CMake
        shell: pwsh
        run: cmake --preset msvc -DMULAN_DXC_EXECUTABLE="$env:MULAN_DXC_EXECUTABLE"

      - name: Build
        run: cmake --build --preset release -- /maxcpucount

      - name: Test
        run: ctest --test-dir build/msvc -C ${{ env.BUILD_TYPE }} --output-on-failure

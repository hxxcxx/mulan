name: Build

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite

jobs:
  build-windows:
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── OpenCASCADE 7.9.3 ──
      # combined zip = OCCT + 3rdparty，无需单独下载 3rdparty
      - name: Cache OpenCASCADE
        id: cache-occt
        uses: actions/cache@v4
        with:
          path: C:\OCCT
          key: occt-7.9.3-vc14-64-combined-v2

      - name: Download and extract OpenCASCADE
        if: steps.cache-occt.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $occtUrl = "https://github.com/Open-Cascade-SAS/OCCT/releases/download/V7_9_3/opencascade-7.9.3-vc14-64-combined.zip"
          $occtZip = "$env:RUNNER_TEMP\occt-combined.zip"

          Write-Host "Downloading OCCT 7.9.3 combined (includes 3rdparty)..."
          Invoke-WebRequest -Uri $occtUrl -OutFile $occtZip -MaximumRetryCount 3

          Write-Host "Extracting..."
          Expand-Archive -Path $occtZip -DestinationPath "C:\OCCT" -Force

          Write-Host "Verifying extraction..."
          Get-ChildItem "C:\OCCT" -Depth 1 | ForEach-Object { Write-Host "  $($_.FullName)" }

      - name: Resolve OCCT_ROOT and OCCT_3RDPARTY_DIR
        shell: pwsh
        run: |
          $occtRoot = "C:\OCCT"
          $thirdPartyDir = "C:\OCCT"

          # 查找含 inc 的目录
          if (-not (Test-Path "$occtRoot\inc")) {
            $sub = Get-ChildItem $occtRoot -Directory -Recurse -Depth 1 |
              Where-Object { Test-Path "$($_.FullName)\inc" } |
              Select-Object -First 1
            if ($sub) { $occtRoot = $sub.FullName }
          }

          # 查找含 vc14 的 3rdparty 目录
          if (-not (Test-Path "$thirdPartyDir\vc14")) {
            $top = Get-ChildItem $thirdPartyDir -Directory -Recurse -Depth 2 |
              Where-Object { Test-Path "$($_.FullName)\vc14" } |
              Select-Object -First 1
            if ($top) { $thirdPartyDir = $top.FullName }
          }

          Write-Host "OCCT_ROOT: $occtRoot"
          Write-Host "OCCT_3RDPARTY_DIR: $thirdPartyDir"
          "OCCT_ROOT=$occtRoot" >> $env:GITHUB_ENV
          "OCCT_3RDPARTY_DIR=$thirdPartyDir" >> $env:GITHUB_ENV

      # ── vcpkg ──
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "616affa24b974b710a4fc26257e90b7fda6d6826"
          # run-vcpkg@v11 still configures the removed x-gha backend by default.
          # Binary packages are cached explicitly by actions/cache below instead.
          doNotCache: true

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-cache
          key: vcpkg-binary-windows-2025-vs2026-v1-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'cmake/vcpkg-overlay-ports/**') }}
          restore-keys: |
            vcpkg-binary-windows-2025-vs2026-v1-

      # slangc 和 glslangValidator 由 vcpkg 提供（shader-slang、glslang[tools]），
      # MulanShaders.cmake 的 find_program 在 configure 期间自动发现。

      # ── Configure & Build ──
      - name: Configure CMake
        shell: pwsh
        run: |
          $env:CMAKE_TOOLCHAIN_FILE = Join-Path $env:VCPKG_ROOT "scripts/buildsystems/vcpkg.cmake"
          cmake --preset msvc

      - name: Build
        run: cmake --build --preset release -- /maxcpucount

      - name: Test
        # GitHub 托管的 Windows Runner 没有可用的 Vulkan ICD 和 OpenGL 图形上下文；
        # 后端仍参与编译，运行时契约由该环境实际支持的 D3D11/D3D12 覆盖。
        env:
          GTEST_FILTER: "-*Vulkan*:*OpenGL*"
        run: ctest --test-dir build/msvc -C ${{ env.BUILD_TYPE }} --output-on-failure
